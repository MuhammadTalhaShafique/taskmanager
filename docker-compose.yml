services:
  frontend:
    build: ./frontend
    container_name: frontend-react
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    depends_on:
      - backend
    networks:
      - mern-network

  backend:
    build: ./backend
    container_name: backend-node
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - JWT_SECRET=FP93ln7u7JsVjaYt4ZXm00pHF6LcNtNWvrIl1WBEwxc=
      - MONGODB_URI=mongodb://mongo-db/taskManager
    depends_on:
      - database
    networks:
      - mern-network

  database:
    image: mongo:latest
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - /home/ubuntu/mongo-backup:/data/db
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
